<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>按鈕跳轉圖片</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    font-family:sans-serif;
}

button{
    padding:16px 32px;
    font-size:20px;
    border:none;
    border-radius:12px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#2563eb;
    transform:scale(1.05);
}
</style>
</head>

<body>

<button onclick="window.location.href='test.png'">
    查看圖片
</button>

</body>
</html>
