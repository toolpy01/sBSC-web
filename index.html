<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吃雞雞</title>

<style>
body{
    margin:0;
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* 標題 */
.title{
    position:absolute;
    top:10%;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:24px;
    font-weight:bold;
    text-shadow:0 0 10px #00e5ff;
}

/* 🔴 點擊次數（紅色RGB） */
.counter{
    position:absolute;
    top:18%;
    left:50%;
    transform:translateX(-50%);
    font-size:22px;
    font-weight:bold;
    color:white;

    animation: redGlow 2s infinite ease-in-out;
}

/* 紅色呼吸發光 */
@keyframes redGlow {
    0% {
        text-shadow:
        0 0 5px #ff0000,
        0 0 10px #ff3333,
        0 0 20px #ff0000;
    }
    50% {
        text-shadow:
        0 0 10px #ff6666,
        0 0 20px #ff0000,
        0 0 30px #ff3333;
    }
    100% {
        text-shadow:
        0 0 5px #ff0000,
        0 0 10px #ff3333,
        0 0 20px #ff0000;
    }
}

/* 按鈕 */
button{
    margin-top:80px;
    padding:16px 34px;
    font-size:20px;
    border-radius:14px;
    cursor:pointer;

    background:#1f2937;

    border:4px solid;
    border-image: linear-gradient(
        45deg,
        red,
        orange,
        yellow,
        green,
        cyan,
        blue,
        violet
    ) 1;

    box-shadow:0 0 10px cyan;
}

/* 彩虹文字 */
button span{
    background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
    background-size:400%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation: rainbowText 3s linear infinite;
    font-weight:bold;
}

@keyframes rainbowText {
    0% { background-position:0% }
    100% { background-position:400% }
}

/* GIF 掉落 */
.fall{
    position:absolute;
    top:-200px;
    animation:fall 4s linear forwards;
    pointer-events:none;

    border:4px solid;
    border-image: linear-gradient(
        45deg,
        red,
        orange,
        yellow,
        green,
        cyan,
        blue,
        violet
    ) 1;

    box-shadow:0 0 15px cyan;
    border-radius:12px;
}

@keyframes fall{
    from{ top:-200px; }
    to{ top:110vh; }
}
</style>
</head>

<body>

<div class="title">我用AI隨便做的🥵</div>

<div class="counter" id="counter">點擊次數：0</div>

<button onclick="dropGif()">
    <span>點我吃雞雞</span>
</button>

<script>

let count = 0;

function dropGif(){

    count++;
    document.getElementById("counter").innerText =
        "點擊次數：" + count;

    const gif = document.createElement("img");

    gif.src = "ed.gif";
    gif.className = "fall";

    const size = Math.max(
        60,
        Math.min(window.innerWidth * 0.2, 120)
    );

    gif.style.width = size + "px";

    gif.style.left =
        Math.random() * (window.innerWidth - size) + "px";

    document.body.appendChild(gif);

    setTimeout(() => {
        gif.remove();
    }, 4000);
}

</script>

</body>
</html>
