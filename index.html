<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吃雞雞</title>

<style>
body{
    margin:0;
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* 標題發光 */
.title{
    position:absolute;
    top:15%;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:24px;
    font-weight:bold;
    text-align:center;

    text-shadow:
        0 0 5px #fff,
        0 0 10px #00e5ff,
        0 0 20px #00e5ff;

    animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
    from { filter: brightness(1); }
    to { filter: brightness(1.5); }
}

/* 🔥 RGB 呼吸按鈕 */
button{
    padding:16px 34px;
    font-size:20px;
    border:none;
    border-radius:14px;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    z-index:1;

    animation: rgbBreath 4s infinite ease-in-out;
}

/* RGB 背景呼吸 */
@keyframes rgbBreath {
    0%   { background:#ff004c; box-shadow:0 0 10px #ff004c; }
    25%  { background:#ffcc00; box-shadow:0 0 15px #ffcc00; }
    50%  { background:#00e5ff; box-shadow:0 0 20px #00e5ff; }
    75%  { background:#7cff00; box-shadow:0 0 15px #7cff00; }
    100% { background:#ff004c; box-shadow:0 0 10px #ff004c; }
}

/* 🌈 彩虹文字 */
button span{
    background: linear-gradient(
        90deg,
        red,
        orange,
        yellow,
        green,
        cyan,
        blue,
        violet
    );
    background-size:400%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation: rainbowText 3s linear infinite;
    font-weight:bold;
}

@keyframes rainbowText {
    0% { background-position:0% }
    100% { background-position:400% }
}

/* 掉落 GIF */
.fall{
    position:absolute;
    top:-200px;
    animation:fall 4s linear forwards;
    pointer-events:none;
}

@keyframes fall{
    from{ top:-200px; }
    to{ top:110vh; }
}
</style>
</head>

<body>

<div class="title">我用AI隨便做的🥵</div>

<button onclick="dropGif()">
    <span>點我吃雞雞</span>
</button>

<script>
function dropGif(){

    const gif = document.createElement("img");

    gif.src = "ed.gif";
    gif.className = "fall";

    const size = Math.max(
        60,
        Math.min(window.innerWidth * 0.2, 120)
    );

    gif.style.width = size + "px";

    gif.style.left =
        Math.random() * (window.innerWidth - size) + "px";

    document.body.appendChild(gif);

    setTimeout(() => {
        gif.remove();
    }, 4000);
}
</script>

</body>
</html>
