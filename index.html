<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>吃雞雞</title>

<style>
body{
    margin:0;
    height:100vh;
    overflow:hidden;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
}

button{
    padding:15px 30px;
    font-size:20px;
}

.fall{
    position:absolute;
    width:120px;
    top:-150px;
    animation:fall 4s linear forwards;
}

@keyframes fall{
    from{
        top:-150px;
    }
    to{
        top:100vh;
    }
}
</style>
</head>
<body>

<button onclick="dropGif()">點我吃雞雞</button>

<script>
function dropGif(){
    const gif = document.createElement("img");

    gif.src = "ed.gif";
    gif.className = "fall";

    // 隨機水平位置
    gif.style.left =
        Math.random() * (window.innerWidth - 120) + "px";

    document.body.appendChild(gif);

    setTimeout(() => {
        gif.remove();
    }, 4000);
}
</script>

</body>
</html>
