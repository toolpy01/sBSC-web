<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吃雞雞</title>

<style>
body{
    margin:0;
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* 標題 */
.title{
    position:absolute;
    top:15%;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:24px;
    font-weight:bold;
    text-shadow:0 0 10px #00e5ff;
}

/* 🔘 按鈕：固定背景 + RGB邊框 */
button{
    padding:16px 34px;
    font-size:20px;
    border-radius:14px;
    cursor:pointer;

    background:#1f2937; /* 固定背景 */
    color:white;

    border:4px solid;
    border-image: linear-gradient(
        45deg,
        red,
        orange,
        yellow,
        green,
        cyan,
        blue,
        violet
    ) 1;

    animation: borderGlow 3s infinite linear;
}

/* 邊框呼吸發光 */
@keyframes borderGlow {
    0%   { box-shadow:0 0 5px red; }
    25%  { box-shadow:0 0 10px yellow; }
    50%  { box-shadow:0 0 15px cyan; }
    75%  { box-shadow:0 0 10px lime; }
    100% { box-shadow:0 0 5px red; }
}

/* 🌈 按鈕文字彩虹 */
button span{
    background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
    background-size:400%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation: rainbowText 3s linear infinite;
    font-weight:bold;
}

@keyframes rainbowText {
    0% { background-position:0% }
    100% { background-position:400% }
}

/* 🎮 GIF 掉落 + RGB邊框 */
.fall{
    position:absolute;
    top:-200px;
    animation:fall 4s linear forwards;
    pointer-events:none;

    border:4px solid;
    border-image: linear-gradient(
        45deg,
        red,
        orange,
        yellow,
        green,
        cyan,
        blue,
        violet
    ) 1;

    box-shadow:0 0 15px cyan;
    border-radius:12px;
}

@keyframes fall{
    from{ top:-200px; }
    to{ top:110vh; }
}
</style>
</head>

<body>

<div class="title">我用AI隨便做的🥵</div>

<button onclick="dropGif()">
    <span>點我吃雞雞</span>
</button>

<script>
function dropGif(){

    const gif = document.createElement("img");

    gif.src = "ed.gif";
    gif.className = "fall";

    const size = Math.max(
        60,
        Math.min(window.innerWidth * 0.2, 120)
    );

    gif.style.width = size + "px";

    gif.style.left =
        Math.random() * (window.innerWidth - size) + "px";

    document.body.appendChild(gif);

    setTimeout(() => {
        gif.remove();
    }, 4000);
}
</script>

</body>
</html>
