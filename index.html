<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吃雞雞</title>

<style>
body{
    margin:0;
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* 發光文字 */
.title{
    position:absolute;
    top:15%;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:24px;
    font-weight:bold;
    text-align:center;

    /* 發光效果 */
    text-shadow:
        0 0 5px #fff,
        0 0 10px #00e5ff,
        0 0 20px #00e5ff,
        0 0 40px #00e5ff;

    animation: glow 2s ease-in-out infinite alternate;
}

/* 發光閃爍動畫 */
@keyframes glow {
    from {
        text-shadow:
            0 0 5px #fff,
            0 0 10px #00e5ff,
            0 0 20px #00e5ff,
            0 0 30px #00e5ff;
    }
    to {
        text-shadow:
            0 0 10px #fff,
            0 0 20px #00ffff,
            0 0 40px #00ffff,
            0 0 60px #00ffff;
    }
}

/* 按鈕 */
button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

/* 掉落圖片 */
.fall{
    position:absolute;
    top:-200px;
    animation:fall 4s linear forwards;
    pointer-events:none;
}

@keyframes fall{
    from{
        top:-200px;
    }
    to{
        top:110vh;
    }
}
</style>
</head>

<body>

<div class="title">我用AI隨便做的🥵</div>

<button onclick="dropGif()">點我吃雞雞</button>

<script>
function dropGif(){

    const gif = document.createElement("img");

    gif.src = "ed.gif";
    gif.className = "fall";

    const size = Math.max(
        60,
        Math.min(window.innerWidth * 0.2, 120)
    );

    gif.style.width = size + "px";

    gif.style.left =
        Math.random() * (window.innerWidth - size) + "px";

    document.body.appendChild(gif);

    setTimeout(() => {
        gif.remove();
    }, 4000);
}
</script>

</body>
</html>
