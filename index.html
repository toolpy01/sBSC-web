<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吃雞雞</title>

<style>
body{
    margin:0;
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* 標題 */
.title{
    position:absolute;
    top:10%;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-size:24px;
    font-weight:bold;
    text-shadow:0 0 10px #00e5ff;
}

/* 🔥 按鈕（流動RGB邊框） */
button{
    margin-top:80px;
    padding:16px 34px;
    font-size:20px;
    border-radius:14px;
    cursor:pointer;

    background:#1f2937;
    color:white;

    border:3px solid transparent;
    position:relative;
    z-index:1;
}

button::before{
    content:"";
    position:absolute;
    inset:-3px;
    border-radius:16px;
    padding:3px;
    background: linear-gradient(
        45deg,
        red,
        orange,
        yellow,
        green,
        cyan,
        blue,
        violet,
        red
    );
    background-size:300%;
    animation: borderMove 3s linear infinite;

    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;

    z-index:-1;
}

@keyframes borderMove{
    0% { background-position:0% }
    100% { background-position:300% }
}

/* 彩虹文字 */
button span{
    background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet);
    background-size:400%;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation: rainbowText 3s linear infinite;
    font-weight:bold;
}

@keyframes rainbowText {
    0% { background-position:0% }
    100% { background-position:400% }
}

/* 🔴 點擊次數 */
.counter{
    margin-top:20px;
    font-size:22px;
    font-weight:bold;
    color:white;
    animation: redGlow 2s infinite ease-in-out;
}

@keyframes redGlow {
    0% {
        text-shadow:0 0 5px #ff0000,0 0 10px #ff3333,0 0 20px #ff0000;
    }
    50% {
        text-shadow:0 0 10px #ff6666,0 0 20px #ff0000,0 0 30px #ff3333;
    }
    100% {
        text-shadow:0 0 5px #ff0000,0 0 10px #ff3333,0 0 20px #ff0000;
    }
}

/* ✨ GIF（金色發光邊框） */
.fall{
    position:absolute;
    top:-200px;
    animation:fall 4s linear forwards;
    pointer-events:none;

    border:2px solid #ffd700;

    box-shadow:
        0 0 5px #ffd700,
        0 0 10px #ffea70,
        0 0 20px rgba(255, 215, 0, 0.7);

    border-radius:10px;
}

@keyframes fall{
    from{ top:-200px; }
    to{ top:110vh; }
}
</style>
</head>

<body>

<div class="title">我用AI隨便做的ᕙ⁠(⁠＠⁠°⁠▽⁠°⁠＠⁠)⁠ᕗ</div>

<button onclick="dropGif()">
    <span>點我吃雞雞</span>
</button>

<div class="counter" id="counter">點擊次數：0</div>

<script>

let count = 0;

function dropGif(){

    count++;
    document.getElementById("counter").innerText =
        "點擊次數：" + count;

    const gif = document.createElement("img");

    gif.src = "ed.gif";
    gif.className = "fall";

    const size = Math.max(
        60,
        Math.min(window.innerWidth * 0.2, 120)
    );

    gif.style.width = size + "px";

    gif.style.left =
        Math.random() * (window.innerWidth - size) + "px";

    document.body.appendChild(gif);

    setTimeout(() => {
        gif.remove();
    }, 4000);
}

</script>

</body>
</html>
